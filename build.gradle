plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'com.gluonhq.gluonfx-gradle-plugin' version '1.0.22'
}

group = 'com.storyboard'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

javafx {
    version = '24'
    modules = ['javafx.controls', 'javafx.fxml']
}

dependencies {
    implementation 'com.google.code.gson:gson:2.11.0'
    implementation 'org.reflections:reflections:0.10.2'
    implementation 'org.kordamp.ikonli:ikonli-antdesignicons-pack:12.4.0'
    implementation 'org.kordamp.ikonli:ikonli-javafx:12.4.0'
}

application {
    mainClass = 'Main'  // ← change to your main class
}

java {
    sourceCompatibility = JavaVersion.VERSION_24
    targetCompatibility = JavaVersion.VERSION_24
}

gluonfx {
    target = 'host' // This tells Gluon to build for your current OS (Windows/Mac/Linux)
}